<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Coach Saab! 🏏</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #4caf50, #1b3312);
            font-family: 'Georgia', serif;
            overflow: hidden;
            color: white;
            touch-action: manipulation;
        }

        #game-info {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid #ffd700;
            width: 80%;
            max-width: 300px;
        }

        #cricket-ball {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            z-index: 99;
            user-select: none;
        }

        /* Container to keep everything centered and visible */
        .letter-container {
            position: relative;
            width: 300px;
            height: 200px;
            margin-top: 50px;
        }

        .envelope {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #d32f2f;
            border-radius: 0 0 10px 10px;
            z-index: 10;
            cursor: pointer;
            opacity: 0.2; /* Starts locked */
            transition: 0.5s;
        }

        .envelope.unlocked { opacity: 1; box-shadow: 0 0 25px #ffd700; }

        .envelope:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            border-top: 100px solid #b71c1c;
            transform-origin: top;
            transition: 0.5s;
            z-index: 11;
        }

        .open.envelope:before { transform: rotateX(180deg); z-index: 5; }

        /* FIXED CARD: Now scrollable and fits screen */
        .card {
            position: absolute;
            width: 270px;
            /* Card height is limited so it doesn't go off screen */
            height: 320px;
            background: white;
            left: 15px;
            bottom: 10px;
            border-radius: 8px;
            padding: 20px;
            transition: 0.8s;
            z-index: 6;
            text-align: center;
            color: #333;
            box-sizing: border-box;
            /* Allow scrolling inside the card */
            overflow-y: auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            visibility: hidden;
            opacity: 0;
        }

        .open .card {
            visibility: visible;
            opacity: 1;
            /* Slides up just enough to be seen clearly */
            transform: translateY(-200px);
        }

        .heart-seal {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            z-index: 12;
        }

        .float-item {
            position: absolute;
            opacity: 0.3;
            animation: float 10s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-info">
        <h3 id="msg" style="margin: 0; font-size: 16px;">Coach Saab, hit the ball 5 times! 🏏</h3>
        <div id="score-bar" style="font-size: 14px; color: #ffd700;">Score: <span id="score">0</span>/5</div>
    </div>

    <div id="cricket-ball">⚾</div>

    <div class="letter-container" id="wrapper">
        <div class="envelope" id="envelope" onclick="openLetter()">
            <div class="heart-seal">❤️</div>
            <div class="card">
                <div style="font-size: 40px;">🏆</div>
                <h2 style="color: #d32f2f; margin: 10px 0;">Happy Birthday Coach Saab</h2>
                <p style="font-size: 16px; line-height: 1.5;">
                    Wishing you lots of love, laughter and you make life sweeter just by being you. 🎂💫
                </p>
                <hr style="border:0; border-top: 1px solid #eee;">
                <p style="font-size: 14px; font-style: italic; color: #666;">
                    Even if we don't end up together, knowing you meant something real to me—and it always will.
                </p>
                <div style="font-size: 30px; margin-top: 10px;">🏏💖</div>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        const ball = document.getElementById('cricket-ball');
        const envelope = document.getElementById('envelope');
        const msg = document.getElementById('msg');

        function moveBall() {
            const x = Math.random() * (window.innerWidth - 80);
            const y = Math.random() * (window.innerHeight - 80);
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
        }

        ball.addEventListener('click', () => {
            score++;
            document.getElementById('score').innerText = score;
            if (score < 5) {
                moveBall();
            } else {
                ball.style.display = 'none';
                envelope.classList.add('unlocked');
                msg.innerText = "Century! 💯 Open your gift!";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }
        });

        function openLetter() {
            if (envelope.classList.contains('unlocked')) {
                envelope.classList.toggle('open');
            }
        }

        // Floating Background
        const items = ['🏏', '⚾', '❤️', '✨'];
        for (let i = 0; i < 15; i++) {
            const el = document.createElement('div');
            el.className = 'float-item';
            el.innerText = items[Math.floor(Math.random() * items.length)];
            el.style.left = Math.random() * 100 + 'vw';
            el.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(el);
        }

        moveBall();
    </script>
</body>
</html>
