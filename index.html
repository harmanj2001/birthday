<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Saab's Match Day! 🏏</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1b3312 0%, #4caf50 100%);
            font-family: 'Arial Rounded MT Bold', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: 0.5s;
        }

        .umpire {
            font-size: 80px;
            cursor: pointer;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* --- GAME UI --- */
        #game-ui {
            z-index: 50;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 15px 25px;
            border-radius: 25px;
            border: 3px solid #ffd700;
            margin-bottom: 20px;
            display: none; /* Hidden until intro clicked */
        }

        #ball-target {
            position: absolute;
            font-size: 60px;
            cursor: pointer;
            z-index: 90;
            display: none;
        }

        /* --- ENVELOPE & CARD --- */
        .letter-area {
            position: relative;
            width: 320px;
            height: 220px;
        }

        .envelope {
            position: relative;
            width: 100%;
            height: 100%;
            background: #d32f2f;
            border-radius: 0 0 15px 15px;
            z-index: 20;
            cursor: pointer;
            opacity: 0.15;
            transition: 0.6s all;
            border: 4px solid #fff;
        }

        .unlocked.envelope { opacity: 1; transform: scale(1.05); }

        .envelope:before {
            content: "";
            position: absolute;
            top: -4px;
            left: -4px;
            border-left: 164px solid transparent;
            border-right: 164px solid transparent;
            border-top: 120px solid #b71c1c;
            transform-origin: top;
            transition: 0.7s;
            z-index: 22;
        }

        .open.envelope:before { transform: rotateX(180deg); z-index: 5; }

        .card {
            position: absolute;
            width: 300px;
            height: 380px;
            background: #fff;
            border-radius: 25px;
            padding: 25px;
            z-index: 15;
            color: #222;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: 0.9s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-sizing: border-box;
            overflow-y: auto;
            visibility: hidden;
        }

        .open .card {
            visibility: visible;
            transform: translateY(-260px);
        }

        .squad { display: flex; justify-content: center; gap: 15px; margin-bottom: 10px; }
        .character { font-size: 50px; animation: dance 1s infinite alternate; }

        @keyframes dance {
            from { transform: translateY(0) rotate(-10deg); }
            to { transform: translateY(-15px) rotate(10deg); }
        }

        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 300;
            background: #ffd700;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <button class="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="bg-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Lullaby-Warm-Instrumental-Piano-Version.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-screen" onclick="startExperience()">
        <div class="umpire">👨‍⚖️🏏</div>
        <h1 style="color: #ffd700;">Awaiting the Coach...</h1>
        <p>Click the Umpire to start the match!</p>
    </div>

    <div id="game-ui">
        <h3 id="hint" style="margin: 0;">Hit the ball 5 times, Coach Saab! 🏏</h3>
        <div style="color: #ffd700; font-size: 22px;">Score: <span id="hits">0</span>/5</div>
    </div>

    <div id="ball-target">⚾</div>

    <div class="letter-area">
        <div class="envelope" id="env" onclick="openCard()">
            <div style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:50px; z-index:23;">❤️</div>
            <div class="card">
                <div class="squad">
                    <div class="character">🧸</div>
                    <div class="character" style="animation-delay: 0.2s;">🏆</div>
                    <div class="character" style="animation-delay: 0.4s;">🏏</div>
                </div>
                <h2 style="color: #d32f2f;">Happy Birthday Coach Saab</h2>
                <p>Wishing you lots of love, laughter and you make life sweeter just by being you. ❤️🎂💫</p>
