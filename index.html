<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Shivam 🎈</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #ff4b5c;
            --secondary: #ff8fab;
            --bg: #f0f4ff;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Floating Balloons Background */
        .balloon {
            position: absolute;
            bottom: -100px;
            font-size: 30px;
            animation: floatUp 8s linear infinite;
            z-index: 1;
        }

        @keyframes floatUp {
            to { transform: translateY(-110vh) translateX(50px); opacity: 0; }
        }

        .container { position: relative; z-index: 10; perspective: 1000px; }

        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--secondary);
            border-radius: 0 0 15px 15px;
            cursor: pointer;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }

        .envelope-wrapper:hover {
            transform: translateY(-10px) rotate(1deg);
            box-shadow: 0 30px 50px rgba(255, 75, 92, 0.2);
        }

        /* The Flap */
        .envelope-wrapper:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #fb6f92;
            transform-origin: top;
            transition: all 0.5s ease;
            z-index: 5;
        }

        .envelope-wrapper.open:before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        /* The Card */
        .card {
            position: absolute;
            width: 290px;
            height: 380px;
            background: white;
            bottom: 10px;
            left: 15px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
            text-align: center;
            box-sizing: border-box;
            opacity: 0;
        }

        .envelope-wrapper.open .card {
            transform: translateY(-280px);
            opacity: 1;
        }

        .heart-seal {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            z-index: 6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .envelope-wrapper.open .heart-seal { display: none; }

        h1 { color: var(--primary); font-size: 22px; margin-top: 0; }
        p { color: #444; line-height: 1.6; font-size: 15px; }

        .music-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border: none;
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .character { font-size: 40px; margin: 15px 0; }
    </style>
</head>
<body>

    <button class="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="bday-music" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/05/Warm-Light.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
            <div class="heart-seal">❤</div>
            <div class="card">
                <div class="character">🥳</div>
                <h1>Happy Birthday Shivam!</h1>
                <p>I hope this year brings you growth, happiness, and everything you've been working toward.</p>
                <p>You deserve success in every way, and I'll always be quietly cheering you on.</p>
                <p>Knowing you meant something real to me—and it always will. ✨</p>
                <p style="font-size: 12px; color: #999;">(Click anywhere to close)</p>
            </div>
        </div>
    </div>

    <script>
        // Create random balloons
        const emojis = ['🎈', '✨', '🎂', '💖', '🍭'];
        function createBalloon() {
            const b = document.createElement('div');
            b.className = 'balloon';
            b.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            b.style.left = Math.random() * 100 + 'vw';
            b.style.animationDuration = (Math.random() * 4 + 6) + 's';
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 8000);
        }
        setInterval(createBalloon, 800);

        function openLetter() {
            const el = document.getElementById('envelope');
            const isOpen = el.classList.contains('open');
            
            el.classList.toggle('open');

            if (!isOpen) {
                // Confetti Burst!
                confetti({
                    particleCount: 150,
                    spread: 7
