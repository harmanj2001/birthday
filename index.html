<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Saab's Birthday Gala 🏏✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --emerald: #143e1d;
            --gold: #d4af37;
            --cream: #fffdf2;
            --text-dark: #222;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Lavish Emerald Background with Golden Tone */
            background: radial-gradient(circle, #2d5a27 0%, var(--emerald) 100%);
            font-family: 'Georgia', serif; /* Elegant font */
            overflow: hidden;
            color: white;
            touch-action: manipulation;
        }

        /* Subtle Geometric Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.05'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6h-2c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6zm25.464-1.95l8.486 8.486-1.414 1.414-8.486-8.486 1.414-1.414z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            z-index: 1;
        }

        /* --- THE UMPIRE INTRO (LAVISH) --- */
        #intro-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0.95) 0%, rgba(20,62,29,0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            text-align: center;
            backdrop-filter: blur(5px);
            transition: opacity 1s;
        }

        .umpire-frame {
            position: relative;
            padding: 30px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 30px var(--gold);
            margin-bottom: 20px;
        }

        .umpire-icon {
            font-size: 100px;
            animation: bounceIn 1s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .lavish-start {
            font-size: 26px;
            color: var(--cream);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* --- GAME ELEMENTS --- */
        #game-header {
            display: none;
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 50px;
            border: 2px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #ball {
            display: none;
            position: absolute;
            font-size: 65px;
            cursor: pointer;
            z-index: 500;
            user-select: none;
            filter: drop-shadow(0 0 15px var(--gold));
            transition: transform 0.1s;
        }

        /* --- ENVELOPE & CARD (LAVISH) --- */
        .envelope-box {
            position: relative;
            width: 320px;
            height: 200px;
            margin-top: 50px;
            z-index: 10;
        }

        .envelope {
            position: relative;
            width: 100%; height: 100%;
            background: #d32f2f; /* Premium Crimson */
            border-radius: 0 0 15px 15px;
            border: 4px solid var(--gold);
            z-index: 10;
            opacity: 0.1; /* Locked */
            transition: 0.6s all;
        }

        .unlocked.envelope { opacity: 1; cursor: pointer; box-shadow: 0 10px 50px rgba(212,175,55,0.6); }

        .envelope:before {
            content: "";
            position: absolute;
            top: -4px; left: -4px;
            border-left: 164px solid transparent;
            border-right: 164px solid transparent;
            border-top: 110px solid #b71c1c;
            transform-origin: top;
            transition: 0.7s;
            z-index: 12;
        }

        .open.envelope:before { transform: rotateX(180deg); z-index: 5; }

        .card {
            position: absolute;
            width: 290px; height: 380px;
            background: var(--cream);
            left: 15px; bottom: 10px;
            border-radius: 20px;
            padding: 30px;
            z-index: 6;
            color: var(--text-dark);
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transition: 0.9s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            visibility: hidden;
            overflow-y: auto;
            border: 5px double var(--gold);
        }

        .open .card {
            visibility: visible;
            transform: translateY(-260px);
        }

        .squad { display: flex; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .character { font-size: 50px; animation: grandDance 0.8s infinite alternate; }

        @keyframes grandDance {
            from { transform: translateY(0); }
            to { transform: translateY(-20px) scale(1.1); }
        }

        /* --- MUSIC BUTTON --- */
        #music-toggle {
            position: fixed;
            top: 20px; right: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--gold);
            color: var(--gold);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 2000;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <button id="music-toggle" onclick="toggleMusic()">🎵</button>
    <audio id="audio" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Lullaby-Warm-Instrumental-Piano-Version.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-overlay" onclick="startGame()">
        <div class="umpire-frame">
            <div class="umpire-icon">👨‍⚖️🏏</div>
        </div>
        <div class="lavish-start">Welcome Coach Saab...<br><span style="font-size: 16px; color: var(--gold);">(Tap to begin)</span></div>
    </div>

    <div id="game-header">
        <h3 style="margin: 0; font-size: 18px;">Hit the ball 5 times!</h3>
        <div style="color: var(--gold); font-size: 24px; font-weight: bold;">Score: <span id="score">0</span>/5</div>
    </div>

    <div id="ball" onclick="handleBallClick()">⚾</div>

    <div class="envelope-box">
        <div class="envelope" id="envelope" onclick="openEnvelope()">
            <div style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:50px; z-index:20;">❤️</div>
            <div class="card">
                <div class="squad">
                    <div class="character">🧸</div>
                    <div class="character" style="animation-delay: 0.2s;">🏆</div>
                    <div class="character" style="animation-delay: 0.4s;">🏏</div>
                </div>
                <h2 style="color: #b71c1c; margin: 10px 0; font-size: 26px;">Happy Birthday Coach Saab</h2>
                <p style="font-size: 19px; line-height: 1.7; color: var(--text-dark);">
                    Wishing you lots of love, laughter and you make life sweeter just by being you. ❤️🎂💫
                </p>
                <div style="font-size: 45px; margin-top: 15px;">🌟✨🥳🏆❤️</div>
            </div>
        </div>
    </div>

    <script>
        let score = 0;
        const audio = document.getElementById('audio');
        const intro = document.getElementById('intro-overlay');
        const header = document.getElementById('game-header');
        const ball = document.getElementById('ball');
        const envelope = document.getElementById('envelope');

        function startGame() {
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                header.style.display = 'block';
                ball.style.display = 'block';
                moveBall();
                // Browsers allow music to play after a user click
                audio.play(); 
            }, 500);
        }

        function moveBall() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
        }

        function handleBallClick() {
            score++;
            document.getElementById('score').innerText = score;
            
            // "Hit" effect
            ball.style.transform = "scale(1.2)";
            setTimeout(() => ball.style.transform = "scale(1)", 100);

            if (score < 5) {
                moveBall();
            } else {
                ball.style.display = 'none';
                header.innerHTML = "<h3 style='margin:0; color:var(--gold);'>CENTURY! 💯<br><span style='font-size:14px; color:white;'>Tap the ball to open your gift!</span></h3>";
                envelope.classList.add('unlocked');
                
                // Pure Gold Confetti burst!
                confetti({
                    particleCount: 250,
                    spread: 90,
                    origin: { y: 0.6 },
                    colors: ['#d4af37', '#ffffff', '#ffd700']
                });
            }
        }

        function openEnvelope() {
            if (envelope.classList.contains('unlocked')) {
                envelope.classList.toggle('open');
            }
        }

        function toggleMusic() {
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }
    </script>
</body>
</html>
