<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Coach Saab! 🏏</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pitch-green: #2d5a27;
            --ball-red: #d32f2f;
            --gold: #ffd700;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #4caf50, #1b3312);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Game UI */
        #game-info {
            position: absolute;
            top: 20px;
            text-align: center;
            z-index: 100;
            background: rgba(0,0,0,0.5);
            padding: 15px 25px;
            border-radius: 30px;
            border: 2px solid var(--gold);
        }

        #cricket-ball {
            position: absolute;
            font-size: 50px;
            cursor: pointer;
            user-select: none;
            z-index: 99;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
            transition: transform 0.1s;
        }

        /* The Envelope (Red Cricket Ball Style) */
        .envelope-wrapper {
            position: relative;
            width: 320px;
            height: 220px;
            background: var(--ball-red);
            border-radius: 0 0 15px 15px;
            cursor: not-allowed;
            opacity: 0.2;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid rgba(255,255,255,0.2); /* Ball seam look */
        }

        .envelope-wrapper.unlocked {
            opacity: 1;
            cursor: pointer;
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--gold);
        }

        .envelope-wrapper:before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            border-left: 160px solid transparent;
            border-right: 160px solid transparent;
            border-top: 120px solid #b71c1c;
            transform-origin: top;
            transition: 0.5s;
            z-index: 5;
        }

        .envelope-wrapper.open:before { transform: rotateX(180deg); z-index: 1; }

        /* The Card */
        .card {
            position: absolute;
            width: 290px;
            height: 380px;
            background: white;
            bottom: 10px;
            left: 15px;
            border-radius: 12px;
            padding: 30px;
            transition: 0.8s;
            z-index: 2;
            text-align: center;
            color: #333;
            opacity: 0;
            box-sizing: border-box;
            border-top: 5px solid var(--ball-red);
        }

        .envelope-wrapper.open .card { transform: translateY(-280px); opacity: 1; }

        .heart-seal {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 45px;
            z-index: 6;
        }

        /* Floating Decorations */
        .float-item {
            position: absolute;
            opacity: 0.4;
            animation: floatAround 10s linear infinite;
        }

        @keyframes floatAround {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-info">
        <h2 id="msg">Coach Saab, hit the ball 5 times! 🏏</h2>
        <div style="font-size: 20px;">Score: <span id="score">0</span>/5</div>
    </div>

    <div id="cricket-ball">⚾</div>

    <div class="envelope-wrapper" id="envelope" onclick="openLetter()">
        <div class="heart-seal">❤️</div>
        <div class="card">
            <div style="font-size: 40px; margin-bottom: 10px;">🏆</div>
            <h1 style="color: #d32f2f; margin: 0; font-size: 22px;">Happy Birthday Coach Saab</h1>
            <p style="font-size: 17px; line-height: 1.6; margin-top: 20px;">
                Wishing you lots of love, laughter and you make life sweeter just by being you. 🎂💫
            </p>
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            <p style="font-size: 14px; color: #666; font-style: italic;">
                Always cheering for you.
            </p>
            <div style="font-size: 30px; margin-top: 10px;">🏏💖</div>
        </div>
    </div>

    <script>
        let clicks = 0;
        const ball = document.getElementById('cricket-ball');
        const scoreDisplay = document.getElementById('score');
        const envelope = document.getElementById('envelope');
        const msg = document.getElementById('msg');

        function moveBall() {
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 100);
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
        }

        ball.addEventListener('click', () => {
            clicks++;
            scoreDisplay.innerText = clicks;
            
            // Add a "hit" effect
            ball.style.transform = "scale(1.5)";
            setTimeout(() => ball.style.transform = "scale(1)", 100);

            if (clicks < 5) {
                moveBall();
            } else {
                finishGame();
            }
        });

        function finishGame() {
            ball.style.display = 'none';
            msg.innerText = "Century! 💯 Click the ball to open!";
            envelope.classList.add('unlocked');
            
            confetti({
                particleCount: 200,
                spread: 90,
                origin: { y: 0.6 },
                colors: ['#ff0000', '#ffffff', '#4caf50', '#ffd700']
            });
        }

        function openLetter() {
            if (envelope.classList.contains('unlocked')) {
                envelope.classList.toggle('open');
            }
        }

        // Floating Background Items (Balls and Hearts)
        const items = ['🏏', '⚾', '❤️', '✨', '🏏'];
        for (let i = 0; i < 20; i++) {
            const div = document.createElement('div');
            div.className = 'float-item';
            div.innerText = items[Math.floor(Math.random() * items.length)];
            div.style.left = Math.random() * 100 + 'vw';
            div.style.fontSize = (Math.random() * 20 + 20) + 'px';
            div.style.animationDuration = (Math.random() * 5 + 5) + 's';
            div.style.animationDelay = (Math.random() * 5) + 's';
            document.body.appendChild(div);
        }

        moveBall();
    </script>
</body>
</html>
