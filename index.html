<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coach Saab's Birthday 🏏💖</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --pink-love: #ff8fab;
            --emerald: #143e1d;
            --cream: #fffdf2;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2d5a27 0%, var(--emerald) 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
            color: white;
            touch-action: manipulation;
        }

        /* --- BACKGROUND CHARACTERS --- */
        .bg-char {
            position: absolute;
            font-size: 30px;
            opacity: 0.2;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(20deg); }
        }

        /* --- INTRO SCREEN --- */
        #intro-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), var(--emerald));
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            text-align: center;
        }

        .umpire-wallpaper {
            font-size: 120px;
            filter: drop-shadow(0 0 20px var(--gold));
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* --- GAME UI --- */
        #game-header {
            display: none;
            position: fixed;
            top: 20px;
            background: rgba(0,0,0,0.7);
            padding: 15px 25px;
            border-radius: 50px;
            border: 2px solid var(--pink-love);
            z-index: 100;
            text-align: center;
        }

        #ball {
            display: none;
            position: absolute;
            font-size: 60px;
            cursor: pointer;
            z-index: 500;
            filter: drop-shadow(0 0 15px var(--pink-love));
        }

        /* --- ENVELOPE & CARD (FIXED) --- */
        .stage {
            position: relative;
            width: 320px;
            height: 220px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .envelope {
            width: 100%;
            height: 100%;
            background: #b71c1c;
            border-radius: 0 0 10px 10px;
            border: 3px solid var(--gold);
            position: relative;
            z-index: 10;
            opacity: 0.1;
            transition: 0.5s;
        }

        .unlocked.envelope { opacity: 1; cursor: pointer; box-shadow: 0 0 40px var(--pink-love); }

        .envelope:before {
            content: "";
            position: absolute;
            top: -3px; left: -3px;
            border-left: 162px solid transparent;
            border-right: 162px solid transparent;
            border-top: 110px solid #8e1616;
            transform-origin: top;
            transition: 0.6s;
            z-index: 11;
        }

        .open.envelope:before { transform: rotateX(180deg); z-index: 5; }

        /* THE CARD: Fixed visibility and overflow */
        .card {
            position: absolute;
            width: 290px;
            max-height: 80vh; /* Prevents going off screen */
            background: var(--cream);
            border-radius: 20px;
            padding: 25px;
            z-index: 6;
            color: #222;
            text-align: center;
            box-shadow: 0 10px 50px rgba(0,0,0,0.5);
            transition: 0.8s transform cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow-y: auto; /* Scroll if message is long */
            border: 4px solid var(--pink-love);
            visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .open .card {
            visibility: visible;
            transform: translateY(-50%); /* Centers it on screen */
            top: 50%;
        }

        .pink-squad {
            font-size: 50px;
            margin-bottom: 10px;
            animation: heartBeat 1s infinite;
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- MUSIC --- */
        #music-btn {
            position: fixed;
            top: 20px; right: 20px;
            background: var(--pink-love);
            border: none;
            padding: 10px;
            border-radius: 50%;
            z-index: 2000;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <button id="music-btn" onclick="toggleMusic()">🎵</button>
    <audio id="bg-audio" loop>
        <source src="https://www.chosic.com/wp-content/uploads/2021/04/Lullaby-Warm-Instrumental-Piano-Version.mp3" type="audio/mpeg">
    </audio>

    <div id="intro-overlay" onclick="begin()">
        <div class="umpire-wallpaper">👨‍⚖️🏏</div>
        <h1 style="color: var(--gold); letter-spacing: 2px;">WELCOME COACH SAAB</h1>
        <p style="color: var(--pink-love); font-weight: bold;">Tap the Umpire to start the match!</p>
    </div>

    <div id="game-header">
        <h3 style="margin: 0; font-size: 16px;">Hit the ball 5 times! 🏏</h3>
        <div style="color: var(--pink-love); font-size: 24px;">Score: <span id="score">0</span>/5</div>
    </div>

    <div id="ball" onclick="hit()">⚾</div>

    <div class="stage">
        <div class="envelope" id="envelope" onclick="openMe()">
            <div style="position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); font-size:50px; z-index:20;">❤️</div>
            <div class="card" id="main-card">
                <div class="pink-squad">💗🧸🏆</div>
                <h2 style="color: #b71c1c; margin: 10px 0;">Happy Birthday Coach Saab</h2>
                <p style="font-size: 18px; line-height: 1.6;">
                    Wishing you lots of love, laughter and you make life sweeter just by being you. ❤️🎂💫
                </p>
                <div style="font-size: 40px; margin-top: 10px;">🏏💖🏆</div>
            </div>
        </div>
    </div>

    <script>
        let count = 0;
        const audio = document.getElementById('bg-audio');

        // Create Background Pink Love Characters
        const icons = ['💗', '🏏', '✨', '🎀', '🧸'];
        for(let i=0; i<15; i++) {
            let b = document.createElement('div');
            b.className = 'bg-char';
            b.innerText = icons[Math.floor(Math.random()*icons.length)];
            b.style.left = Math.random()*100 + 'vw';
            b.style.top = Math.random()*100 + 'vh';
            b.style.animationDelay = Math.random()*5 + 's';
            document.body.appendChild(b);
        }

        function begin() {
            document.getElementById('intro-overlay').style.display = 'none';
            document.getElementById('game-header').style.display = 'block';
            document.getElementById('ball').style.display = 'block';
            audio.play();
            move();
        }

        function move() {
            const ball = document.getElementById('ball');
            ball.style.left = Math.random() * (window.innerWidth - 80) + 'px';
            ball.style.top = Math.random() * (window.innerHeight - 80) + 'px';
        }

        function hit() {
            count++;
            document.getElementById('score').innerText = count;
            if (count < 5) {
                move();
            } else {
                document.getElementById('ball').style.display = 'none';
                document.getElementById('game-header').innerHTML = "<h3 style='color:var(--gold);'>CENTURY! 💯 Tap the ball!</h3>";
                document.getElementById('envelope').classList.add('unlocked');
                confetti({ particleCount: 200, spread: 80, colors: ['#ff8fab', '#d4af37', '#ffffff'] });
            }
        }

        function openMe() {
            const env = document.getElementById('envelope');
            if(env.classList.contains('unlocked')) {
                env.classList.toggle('open');
            }
        }

        function toggleMusic() {
            if (audio.paused) audio.play(); else audio.pause();
        }
    </script>
</body>
</html>
